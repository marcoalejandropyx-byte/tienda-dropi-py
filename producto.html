<!DOCTYPE html>
<html lang="es-PY">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Producto — DropiStore PY</title>
<style>
  :root{
    --brand:#e8322d;--brand-dark:#b81e1a;--wa:#25d366;--ink:#16181d;--muted:#6b7280;
    --line:#e6e8ec;--bg:#f6f7f9;--card:#fff;--ok:#1f9d55;--shadow:0 10px 34px rgba(20,24,31,.10);--radius:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55}
  img{max-width:100%;display:block}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none}
  .container{max-width:1080px;margin:0 auto;padding:0 18px}
  header.site{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;gap:14px;height:60px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
  .logo .dot{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--brand),#ff7a45);display:grid;place-items:center;color:#fff;font-weight:900}
  .back{margin-left:auto;font-size:14px;font-weight:700;color:var(--brand)}
  .trust-strip{background:var(--ink);color:#fff;font-size:12.5px;text-align:center;padding:7px 12px}
  .trust-strip b{color:#ffd36b}
  .wrap{display:grid;grid-template-columns:1fr 1fr;gap:36px;padding:34px 0}
  .gallery .main{background:#fff;border:1px solid var(--line);border-radius:var(--radius);aspect-ratio:1/1;overflow:hidden;display:grid;place-items:center}
  .gallery .main img{width:100%;height:100%;object-fit:contain}
  .thumbs{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
  .thumbs img{width:66px;height:66px;object-fit:cover;border-radius:10px;border:2px solid var(--line);cursor:pointer;background:#fff}
  .thumbs img.active{border-color:var(--brand)}
  .cat{display:inline-block;font-size:12px;font-weight:800;color:var(--brand);background:#fff5f3;padding:5px 12px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
  h1{font-size:30px;line-height:1.15;margin:14px 0 12px;letter-spacing:-.5px}
  .price-row{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .price{font-size:34px;font-weight:900}
  .old{font-size:18px;color:var(--muted);text-decoration:line-through}
  .off{font-size:13px;font-weight:800;color:var(--ok);background:#e7f6ec;padding:4px 10px;border-radius:8px}
  .stock{font-size:13.5px;font-weight:700;margin:8px 0 18px}
  .stock.ok{color:var(--ok)} .stock.no{color:var(--brand)}
  .cta{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:16px 22px;border-radius:14px;font-weight:800;font-size:16px;transition:.15s transform}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-wa{background:var(--wa);color:#fff}
  .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .benefits{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0;padding:16px;background:#fff;border:1px solid var(--line);border-radius:14px}
  .benefits div{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;color:#374151}
  .benefits .i{font-size:18px}
  .desc-box{grid-column:1/-1;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:26px;margin-top:6px}
  .desc-box h2{font-size:20px;margin:0 0 14px}
  .desc-box .content{font-size:15px;color:#374151}
  .desc-box .content img{border-radius:12px;margin:12px 0}
  .loading,.error{grid-column:1/-1;text-align:center;padding:80px 10px;color:var(--muted)}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;margin:0 auto 14px;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  footer.site{background:var(--ink);color:#c7ccd6;margin-top:26px;padding:26px 0;text-align:center;font-size:13px}
  .wa-float{position:fixed;bottom:20px;left:20px;z-index:15;background:var(--wa);color:#fff;width:56px;height:56px;border-radius:50%;display:grid;place-items:center;font-size:28px;box-shadow:0 8px 24px rgba(37,211,102,.5)}

  /* Checkout modal */
  .modal{position:fixed;inset:0;z-index:60;display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow:auto;background:rgba(10,12,16,.55)}
  .modal.open{display:flex}
  .m-card{background:#fff;border-radius:18px;width:100%;max-width:480px;box-shadow:0 30px 80px rgba(0,0,0,.3);margin:auto}
  .m-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .m-head h3{margin:0;font-size:18px}
  .x{background:var(--bg);width:34px;height:34px;border-radius:10px;font-size:18px;font-weight:700;color:#374151}
  .m-body{padding:20px}
  .m-sum{background:var(--bg);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;font-weight:700;margin-bottom:16px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:13px;font-weight:700;margin-bottom:5px}
  .field input,.field select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit}
  .field input:focus,.field select:focus{outline:2px solid var(--brand);border-color:transparent}
  .field.bad input,.field.bad select{border-color:var(--brand);background:#fff5f3}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .submit{width:100%;padding:15px;border-radius:12px;font-weight:800;font-size:15.5px;color:#fff;background:var(--ok);margin-top:6px}
  .lock{display:flex;align-items:center;gap:7px;justify-content:center;font-size:12px;color:var(--muted);margin-top:12px}
  .success{text-align:center;padding:16px 6px}
  .success .circle{width:72px;height:72px;border-radius:50%;background:#e7f6ec;color:var(--ok);display:grid;place-items:center;font-size:38px;margin:0 auto 14px}
  @media(max-width:820px){.wrap{grid-template-columns:1fr;gap:22px;padding:22px 0}h1{font-size:24px}.price{font-size:28px}.benefits{grid-template-columns:1fr}.two{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="trust-strip">🚚 <b>Envío a todo Paraguay</b> · Pago contra entrega · Compra segura</div>

<header class="site">
  <div class="container bar">
    <a class="logo" href="/"><span class="dot">D</span> DropiStore PY</a>
    <a class="back" href="/">← Volver al catálogo</a>
  </div>
</header>

<main class="container">
  <div class="wrap" id="wrap"><div class="loading"><div class="spin"></div>Cargando producto…</div></div>
</main>

<!-- Checkout contra entrega -->
<div class="modal" id="checkout">
  <div class="m-card">
    <div class="m-head"><h3>Finalizar pedido — Contra entrega</h3><button class="x" onclick="closeCheckout()">✕</button></div>
    <div class="m-body" id="checkoutBody"></div>
  </div>
</div>

<a class="wa-float" id="waFloat" href="#" title="WhatsApp">💬</a>
<footer class="site">© <span id="year"></span> DropiStore PY · Precios en Guaraníes (Gs)</footer>

<script>
const CONFIG = { whatsappNumber: "595981123456", currency: "Gs" };
const fmt = n => CONFIG.currency + " " + Number(n||0).toLocaleString("es-PY");
const params = new URLSearchParams(location.search);
const id = params.get("id");
let PROD = null;
document.getElementById("year").textContent = new Date().getFullYear();
function waLink(t){ return `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(t)}`; }
document.getElementById("waFloat").href = waLink("Hola! Quiero consultar por un producto 😊");

async function load(){
  const wrap = document.getElementById("wrap");
  if(!id){ wrap.innerHTML = `<div class="error">Producto no especificado. <a href="/" style="color:var(--brand)">Volver</a></div>`; return; }
  try{
    const r = await fetch(`/api/product?id=${encodeURIComponent(id)}`);
    const j = await r.json();
    if(!j.ok || !j.product) throw new Error("no data");
    PROD = j.product; render(PROD);
  }catch(e){
    wrap.innerHTML = `<div class="error">No pudimos cargar este producto.<br/><a href="/" style="color:var(--brand)">Volver al catálogo</a></div>`;
  }
}

function render(p){
  const off = p.old && p.old>p.price ? Math.round((1 - p.price/p.old)*100) : 0;
  const imgs = (p.images && p.images.length) ? p.images : (p.image?[p.image]:[]);
  const mainImg = imgs[0] || "";
  document.title = `${p.name} — DropiStore PY`;
  document.getElementById("wrap").innerHTML = `
    <div class="gallery">
      <div class="main"><img id="mainImg" src="${mainImg}" alt="${p.name}"/></div>
      ${imgs.length>1 ? `<div class="thumbs">${imgs.map((u,i)=>`<img src="${u}" class="${i===0?'active':''}" onclick="setMain('${u}',this)"/>`).join("")}</div>`:""}
    </div>
    <div class="info">
      ${p.category?`<span class="cat">${p.category}</span>`:""}
      <h1>${p.name}</h1>
      <div class="price-row"><span class="price">${fmt(p.price)}</span>${off>0?`<span class="old">${fmt(p.old)}</span><span class="off">-${off}%</span>`:""}</div>
      <div class="stock ok">✅ Disponible · Envío a todo Paraguay</div>
      <div class="cta">
        <button class="btn btn-primary" onclick="openCheckout()">🛒 Comprar — Pago contra entrega</button>
        <a class="btn btn-wa" href="${waLink('Hola! Quiero pedir: '+p.name+' ('+fmt(p.price)+') '+location.href)}" target="_blank">💬 O pedir por WhatsApp</a>
      </div>
      <div class="benefits">
        <div><span class="i">🚚</span> Envío a todo el país</div>
        <div><span class="i">💵</span> Pagás al recibir</div>
        <div><span class="i">🔒</span> Compra segura</div>
        <div><span class="i">↩️</span> Cambios y devoluciones</div>
      </div>
    </div>
    <div class="desc-box"><h2>Descripción</h2><div class="content">${p.descHtml || ("<p>"+(p.desc||"Sin descripción.")+"</p>")}</div></div>`;
}
function setMain(url, el){ document.getElementById("mainImg").src = url; document.querySelectorAll(".thumbs img").forEach(t=>t.classList.remove("active")); el.classList.add("active"); }

/* ---------- Checkout contra entrega ---------- */
function openCheckout(){
  if(!PROD) return;
  document.getElementById("checkoutBody").innerHTML = `
    <div class="m-sum"><span>${PROD.name}</span><span>${fmt(PROD.price)}</span></div>
    <form id="orderForm" novalidate>
      <div class="field" id="f-name"><label>Nombre y apellido *</label><input name="name" placeholder="Ej: Juan Pérez"/></div>
      <div class="two">
        <div class="field" id="f-phone"><label>Teléfono / WhatsApp *</label><input name="phone" inputmode="numeric" placeholder="0981 123 456"/></div>
        <div class="field" id="f-city"><label>Ciudad *</label><input name="city" placeholder="Asunción"/></div>
      </div>
      <div class="field" id="f-dept"><label>Departamento *</label>
        <select name="dept"><option value="">Seleccionar…</option>
        <option>Central</option><option>Asunción</option><option>Alto Paraná</option><option>Itapúa</option>
        <option>Caaguazú</option><option>San Pedro</option><option>Cordillera</option><option>Guairá</option>
        <option>Paraguarí</option><option>Concepción</option><option>Misiones</option><option>Ñeembucú</option>
        <option>Amambay</option><option>Canindeyú</option><option>Presidente Hayes</option><option>Caazapá</option>
        <option>Boquerón</option><option>Alto Paraguay</option></select></div>
      <div class="field" id="f-address"><label>Dirección de entrega *</label><input name="address" placeholder="Calle, número, barrio, referencia"/></div>
      <button type="submit" class="submit" id="submitBtn">✅ Confirmar pedido contra entrega</button>
      <div class="lock">🔒 Pagás en efectivo cuando recibís el producto</div>
    </form>`;
  document.getElementById("orderForm").addEventListener("submit", submitOrder);
  document.getElementById("checkout").classList.add("open");
}
function closeCheckout(){ document.getElementById("checkout").classList.remove("open"); }

async function submitOrder(e){
  e.preventDefault();
  const f = e.target;
  const data = Object.fromEntries(new FormData(f).entries());
  const checks = [["f-name",v=>v.trim().length>=3],["f-phone",v=>v.replace(/\D/g,'').length>=7],
    ["f-city",v=>v.trim().length>=2],["f-dept",v=>v.trim()!==""],["f-address",v=>v.trim().length>=5]];
  let ok=true;
  checks.forEach(([fid,fn])=>{ const w=document.getElementById(fid); const inp=w.querySelector("input,select");
    const good=fn(inp.value); w.classList.toggle("bad",!good); if(!good) ok=false; });
  if(!ok) return;
  const btn=document.getElementById("submitBtn"); btn.textContent="⏳ Enviando pedido…"; btn.style.pointerEvents="none";
  try{
    const r = await fetch("/api/order",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ ...data, variantId:PROD.variantId, qty:1, price:PROD.price, product:PROD.name })});
    const j = await r.json();
    if(j.ok){ success(j.orderNumber, data.name); }
    else if(j.configured===false){ fail("El sistema de pedidos aún no está configurado (falta el token de Shopify). Podés pedir por WhatsApp mientras tanto."); }
    else { fail("No se pudo crear el pedido. Probá de nuevo o pedí por WhatsApp."); }
  }catch(err){ fail("Error de conexión. Probá por WhatsApp."); }
  btn.textContent="✅ Confirmar pedido contra entrega"; btn.style.pointerEvents="";
}
function success(num, name){
  document.getElementById("checkoutBody").innerHTML = `
    <div class="success"><div class="circle">✓</div>
      <h3 style="margin:0 0 8px">¡Pedido confirmado!</h3>
      <p style="color:var(--muted)">Gracias ${name||''}. Tu pedido ${num?('<b>'+num+'</b>'):''} quedó registrado.<br/>Te contactaremos para coordinar la entrega. Pagás al recibir.</p>
      <button class="btn btn-ghost" style="margin:8px auto 0;max-width:240px" onclick="location.href='/'">Seguir comprando</button>
    </div>`;
}
function fail(msg){
  const b=document.createElement("div"); b.style.cssText="background:#fff5f3;color:var(--brand);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:10px";
  b.textContent="⚠️ "+msg; document.getElementById("orderForm").appendChild(b);
}
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeCheckout(); });
load();
</script>
</body>
</html>
